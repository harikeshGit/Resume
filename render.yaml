services:
  - type: web
    name: ai-resume-screening
    env: python
    plan: free
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      # scikit-learn wheels are not available for every Python release.
      # Pin to a widely-supported version to avoid source builds.
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/resume_screening.db
